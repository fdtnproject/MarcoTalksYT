<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Stage — Divine Comedy</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #000;
    --hint: rgba(255, 255, 255, 0.55);
    --hint-bg: rgba(0, 0, 0, 0.65);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #fff;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    cursor: none;
  }
  body.show-cursor { cursor: default; }

  #stage {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 900ms ease;
    will-change: opacity;
  }
  .slide.active { opacity: 1; }
  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  /* Black state is just: no active slide. */

  /* Text overlay slide type (for frase-martello on black) */
  .slide.text-slide {
    padding: 6vh 10vw;
    text-align: center;
  }
  .slide.text-slide .lines {
    font-family: "Iowan Old Style", "Palatino", "Georgia", serif;
    font-size: clamp(2rem, 4.8vw, 4.6rem);
    line-height: 1.35;
    letter-spacing: 0.01em;
    color: #f4f1ea;
    text-shadow: 0 2px 30px rgba(0,0,0,0.6);
  }
  .slide.text-slide .lines > div + div { margin-top: 0.4em; }

  /* HUD: controls hint + index, fades out after 2s idle */
  #hud {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    color: var(--hint);
    font-size: 12px;
    letter-spacing: 0.03em;
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    transition: opacity 400ms ease;
    z-index: 10;
  }
  body.idle #hud { opacity: 0; }
  #hud .keys code {
    padding: 2px 6px;
    margin-right: 6px;
    background: var(--hint-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  #hud .index { font-variant-numeric: tabular-nums; }

  /* Title card shown on load */
  #titlecard {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #000;
    z-index: 20;
    transition: opacity 600ms ease;
    padding: 0 10vw;
  }
  #titlecard.hidden { opacity: 0; pointer-events: none; }
  #titlecard .kicker {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 28px;
  }
  #titlecard h1 {
    font-family: "Iowan Old Style", "Palatino", "Georgia", serif;
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 4.5rem);
    margin: 0 0 18px 0;
    letter-spacing: 0.01em;
  }
  #titlecard .tagline {
    font-family: "Iowan Old Style", "Palatino", "Georgia", serif;
    font-style: italic;
    color: rgba(255,255,255,0.72);
    font-size: clamp(1rem, 2vw, 1.4rem);
  }
  #titlecard .ready {
    margin-top: 60px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Error state */
  #err {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #e55;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
    padding: 40px;
    text-align: center;
    line-height: 1.6;
  }
  #err.show { display: flex; }
</style>
</head>
<body class="idle">

<div id="titlecard">
  <div class="kicker" id="tc-kicker">Divine Comedy</div>
  <h1 id="tc-title">Stage</h1>
  <div class="tagline" id="tc-tagline"></div>
  <div class="ready">Premi → per iniziare</div>
</div>

<div id="stage">
  <!-- slides injected here -->
</div>

<div id="hud">
  <div class="keys">
    <code>→</code> avanza
    <code>←</code> indietro
    <code>B</code> nero
    <code>F</code> fullscreen
    <code>0-9</code> salta
  </div>
  <div class="index" id="idx">—</div>
</div>

<div id="err"></div>

<script>
(function () {
  'use strict';

  // ---------- Config ----------
  // Resolve which canto to load from ?canto=XX (e.g. ?canto=01).
  // Fallback: 01.
  const params = new URLSearchParams(window.location.search);
  const cantoId = (params.get('canto') || '01').padStart(2, '0');
  const cantiche = params.get('cantica') || 'inferno';

  // A tiny per-canto manifest. Extend as more canti are added.
  // Each entry is a slide: { type: 'image'|'text'|'black', src?, lines?, label? }
  // Order matters: these are the keyboard steps.
  const MANIFESTS = {
    '01': {
      title: 'Inferno — Canto I',
      tagline: 'Senza misura non c\u2019è via',
      basePath: './inferno/canto-01/images/',
      slides: [
        { type: 'image', src: 'IMG_5465 2.JPG', label: 'Selva / smarrimento' },
        { type: 'image', src: 'IMG_5466 2.JPG', label: 'Virgilio apparso' },
        { type: 'black', label: 'Nero — frase martello' },
        { type: 'text', lines: ['La lonza devia.', 'Il leone domina.', 'La lupa svuota.'], label: 'Tre fiere' },
        { type: 'image', src: 'IMG_5466 2.JPG', label: 'Chiusura — il viaggio parte' }
      ]
    },
    '02': {
      title: 'Inferno — Canto II',
      tagline: 'Non si scende da soli',
      basePath: './inferno/canto-02/images/',
      slides: [
        // Assets da aggiungere quando pronti. Placeholders logici:
        { type: 'black', label: 'Nero — apertura' },
        { type: 'text', lines: ['Io sol uno.'], label: 'Apertura' },
        { type: 'black', label: 'Viltà — nero' },
        { type: 'text', lines: ['Amor mi mosse,', 'che mi fa parlare.'], label: 'Amor mi mosse' },
        { type: 'text', lines: ['Maria vede.', 'Lucia si muove.', 'Beatrice scende.'], label: 'Tre donne benedette' },
        { type: 'text', lines: ['Intrai per lo cammino', 'alto e silvestro.'], label: 'Chiusura' }
      ]
    },
    '03': {
      title: 'Inferno — Canto III',
      tagline: 'Anche non scegliere è una condanna',
      basePath: './inferno/canto-03/images/',
      slides: [
        // Assets da aggiungere quando pronti. Placeholders testo + nero:
        { type: 'black', label: 'Nero — apertura / la porta' },
        { type: 'text', lines: ['Per me si va.'], label: 'Iscrizione' },
        { type: 'text', lines: ['Lasciate ogne speranza,', 'voi ch\u2019intrate.'], label: 'Frase-martello porta' },
        { type: 'black', label: 'Nero — sulla soglia' },
        { type: 'text', lines: ['Non ragioniam di lor,', 'ma guarda e passa.'], label: 'Non ragioniam di lor' },
        { type: 'text', lines: ['Per viltade', 'il gran rifiuto.'], label: 'Il gran rifiuto' },
        { type: 'text', lines: ['Mai non fur vivi.'], label: 'Ignavi — mai non fur vivi' },
        { type: 'text', lines: ['Vuolsi cos\u00ec col\u00e0', 'dove si puote', 'ci\u00f2 che si vuole.'], label: 'Vuolsi cos\u00ec' },
        { type: 'text', lines: ['La tema', 'si volve in disio.'], label: 'Tema in disio' },
        { type: 'black', label: 'Nero — svenimento' },
        { type: 'text', lines: ['Anche non scegliere', '\u00e8 una condanna.'], label: 'Motto — chiusura' }
      ]
    }
  };

  const manifest = MANIFESTS[cantoId];
  if (!manifest) {
    showError('Nessun manifest per canto "' + cantoId + '". Aggiungi una voce in MANIFESTS dentro stage.html.');
    return;
  }

  // ---------- Title card ----------
  document.getElementById('tc-kicker').textContent = 'Divine Comedy \u00b7 ' + cantiche.toUpperCase();
  document.getElementById('tc-title').textContent = manifest.title;
  document.getElementById('tc-tagline').textContent = manifest.tagline || '';

  // ---------- Build slides ----------
  const stage = document.getElementById('stage');
  const idxEl = document.getElementById('idx');
  const titlecard = document.getElementById('titlecard');
  const slides = manifest.slides;
  const slideEls = [];

  slides.forEach((slide, i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.dataset.index = String(i);

    if (slide.type === 'image') {
      const img = document.createElement('img');
      img.src = manifest.basePath + slide.src;
      img.alt = slide.label || '';
      img.onerror = () => {
        img.remove();
        const fallback = document.createElement('div');
        fallback.className = 'lines';
        fallback.style.color = '#7a5';
        fallback.textContent = '[immagine mancante: ' + slide.src + ']';
        el.classList.add('text-slide');
        el.appendChild(fallback);
      };
      el.appendChild(img);
    } else if (slide.type === 'text') {
      el.classList.add('text-slide');
      const wrap = document.createElement('div');
      wrap.className = 'lines';
      (slide.lines || []).forEach(line => {
        const d = document.createElement('div');
        d.textContent = line;
        wrap.appendChild(d);
      });
      el.appendChild(wrap);
    } else {
      // black: nothing inside; the slide stays empty and transparent.
      // We still render a slide element so stepping through respects it.
      el.classList.add('black-slide');
    }

    stage.appendChild(el);
    slideEls.push(el);
  });

  // ---------- State ----------
  let index = -1;         // -1 = title card
  let blackOverride = false;

  function render() {
    const hidden = index < 0;
    titlecard.classList.toggle('hidden', !hidden);
    slideEls.forEach((el, i) => {
      const isActive = !hidden && !blackOverride && i === index;
      el.classList.toggle('active', isActive);
    });
    if (hidden) {
      idxEl.textContent = '—';
    } else {
      const slide = slides[index];
      const type = slide.type.toUpperCase();
      idxEl.textContent =
        (index + 1) + '/' + slides.length +
        '  \u00b7  ' + type +
        (slide.label ? '  \u00b7  ' + slide.label : '') +
        (blackOverride ? '  \u00b7  [BLACK]' : '');
    }
  }

  function next() {
    blackOverride = false;
    if (index < slides.length - 1) index++;
    else index = slides.length - 1;
    render();
  }
  function prev() {
    blackOverride = false;
    if (index > -1) index--;
    render();
  }
  function jump(n) {
    blackOverride = false;
    if (n >= 0 && n < slides.length) { index = n; render(); }
  }
  function toggleBlack() { blackOverride = !blackOverride; render(); }
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  // ---------- Input ----------
  window.addEventListener('keydown', (e) => {
    // Ignore modifier combos so browser shortcuts still work.
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    switch (e.key) {
      case 'ArrowRight':
      case ' ':
      case 'PageDown':
      case 'Enter':
        e.preventDefault(); next(); break;
      case 'ArrowLeft':
      case 'PageUp':
      case 'Backspace':
        e.preventDefault(); prev(); break;
      case 'Home':
        e.preventDefault(); jump(0); break;
      case 'End':
        e.preventDefault(); jump(slides.length - 1); break;
      case 'b': case 'B':
        e.preventDefault(); toggleBlack(); break;
      case 'f': case 'F':
        e.preventDefault(); toggleFullscreen(); break;
      case 'Escape':
        e.preventDefault(); index = -1; blackOverride = false; render(); break;
      default:
        if (/^[0-9]$/.test(e.key)) {
          const n = parseInt(e.key, 10);
          // 1..9 → slide 1..9 (1-indexed), 0 → slide 10
          const target = n === 0 ? 9 : n - 1;
          jump(target);
        }
    }
  });

  // Click to advance is handy on stage but makes the audience interactive; keep it behind a URL param.
  if (params.get('click') === '1') {
    window.addEventListener('click', next);
  }

  // ---------- Idle cursor / hud ----------
  let idleTimer = null;
  function wake() {
    document.body.classList.remove('idle');
    document.body.classList.add('show-cursor');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      document.body.classList.add('idle');
      document.body.classList.remove('show-cursor');
    }, 2000);
  }
  window.addEventListener('mousemove', wake);
  window.addEventListener('keydown', wake);
  wake();

  // Initial paint
  render();

  // ---------- Utils ----------
  function showError(msg) {
    const e = document.getElementById('err');
    e.textContent = msg;
    e.classList.add('show');
  }
})();
</script>
</body>
</html>
