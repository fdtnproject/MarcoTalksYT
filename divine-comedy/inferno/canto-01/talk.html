<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inferno - Canto I | Talk</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap');

    :root {
      --bg: #100c0b;
      --panel: rgba(255, 247, 239, 0.08);
      --panel-solid: rgba(23, 16, 14, 0.88);
      --panel-border: rgba(255, 236, 219, 0.14);
      --text: #fff4ea;
      --muted: rgba(255, 244, 234, 0.72);
      --ember: #da6a35;
      --gold: #f0c38c;
      --brick: #7f2319;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Source Sans 3", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(218, 106, 53, 0.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(240, 195, 140, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(127, 35, 25, 0.26), transparent 34%),
        linear-gradient(180deg, #18110f 0%, #100c0b 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 120px 120px;
      mask-image: radial-gradient(circle at center, black, transparent 85%);
      opacity: 0.28;
    }

    a { color: inherit; }

    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .topbar {
      position: sticky;
      top: 12px;
      z-index: 30;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: rgba(16, 12, 11, 0.76);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .topbar .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .topbar .brand strong {
      font-family: "Cinzel", serif;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .topbar .brand span {
      font-size: 14px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 236, 219, 0.16);
      text-decoration: none;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.03);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(240, 195, 140, 0.48);
      background: rgba(255, 255, 255, 0.06);
    }

    .button.primary {
      background: linear-gradient(135deg, var(--gold), var(--ember));
      border-color: transparent;
      color: #140c0b;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero.text-only {
      grid-template-columns: 1fr;
    }

    .hero-copy,
    .hero-media,
    .notes,
    .nav-card,
    .script-card {
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: 34px;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(240, 195, 140, 0.28);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Cinzel", serif;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.94;
    }

    .tagline {
      margin: 0 0 18px;
      font-size: clamp(18px, 2.2vw, 28px);
      color: var(--gold);
    }

    .lead {
      margin: 0;
      max-width: 700px;
      font-size: clamp(18px, 2vw, 23px);
      line-height: 1.58;
      color: var(--muted);
    }

    .hero-media {
      overflow: hidden;
      display: grid;
      grid-template-rows: 1.25fr 1fr;
      gap: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    .frame {
      position: relative;
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.02) saturate(0.9);
    }

    .frame figcaption {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(16, 12, 11, 0.7);
      backdrop-filter: blur(10px);
    }

    .frame figcaption strong {
      font-size: 15px;
      color: var(--text);
    }

    .frame figcaption span {
      font-size: 13px;
      color: var(--muted);
    }

    .utility-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      margin-bottom: 22px;
    }

    .notes,
    .nav-card {
      padding: 24px 24px 22px;
    }

    .notes h2,
    .nav-card h2 {
      margin: 0 0 14px;
      font-family: "Cinzel", serif;
      font-size: 24px;
    }

    .notes ul,
    .nav-card ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .nav-card ol {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-card a {
      text-decoration: none;
      color: var(--text);
    }

    .nav-card a:hover {
      color: var(--gold);
    }

    .script {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .script-card {
      padding: 28px;
    }

    .script-card h2 {
      margin: 0;
      font-family: "Cinzel", serif;
      font-size: clamp(24px, 3.2vw, 34px);
      line-height: 1.1;
    }

    .section-top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-index {
      min-width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #140c0b;
      background: linear-gradient(135deg, var(--gold), var(--ember));
    }

    .cue {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(240, 195, 140, 0.08);
      border: 1px solid rgba(240, 195, 140, 0.18);
    }

    blockquote {
      margin: 0 0 18px;
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid rgba(255, 236, 219, 0.12);
      background: rgba(255, 255, 255, 0.03);
    }

    blockquote span,
    .copy span {
      display: block;
    }

    blockquote span {
      font-family: "Cinzel", serif;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.7;
      color: var(--text);
    }

    .copy {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .copy p {
      margin: 0;
      font-size: clamp(18px, 1.95vw, 22px);
      line-height: 1.7;
      color: var(--muted);
    }

    .copy p.pause {
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 14px;
    }

    footer {
      padding: 22px 4px 0;
      color: rgba(255, 244, 234, 0.52);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .hero,
      .utility-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1240px);
      }

      .hero-copy,
      .notes,
      .nav-card,
      .script-card {
        padding: 22px;
        border-radius: 24px;
      }

      .section-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <strong>MarcoTalksYT</strong>
        <span id="topbar-subtitle">Talk reader del Canto I</span>
      </div>
      <div class="actions">
        <a class="button primary" href="./teleprompter.html">Apri Teleprompter</a>
        <a class="button" href="./scripts/Canto_01_talk_finale.md">Script Finale</a>
        <a class="button" href="./scripts/Canto_01_cue_immagini.md">Cue Immagini</a>
      </div>
    </div>

    <section class="hero">
      <article class="hero-copy">
        <span class="eyebrow" id="hero-kicker"></span>
        <h1 id="hero-title"></h1>
        <p class="tagline" id="hero-tagline"></p>
        <p class="lead" id="hero-description"></p>
      </article>

      <article class="hero-media" id="hero-media"></article>
    </section>

    <section class="utility-grid">
      <article class="notes">
        <h2 id="notes-title"></h2>
        <ul id="notes-list"></ul>
      </article>

      <aside class="nav-card">
        <h2>Scaletta</h2>
        <ol id="section-nav"></ol>
      </aside>
    </section>

    <main class="script" id="script"></main>

    <footer>
      Base pronta per prova, teleprompter e proiezione del Canto I.
    </footer>
  </div>

  <script src="./canto01-content.js"></script>
  <script src="./canto01-render-utils.js"></script>
  <script>
    const content = window.CANTO_ONE;
    const utils = window.CANTO_RENDER_UTILS;
    const doc = utils.parseCantoMarkdown(content.markdown);

    document.getElementById("topbar-subtitle").textContent = content.tagline;
    document.getElementById("hero-kicker").textContent = content.kicker;
    document.getElementById("hero-title").textContent = content.title;
    document.getElementById("hero-tagline").textContent = content.tagline;
    document.getElementById("hero-description").textContent = content.description;
    document.getElementById("notes-title").textContent = doc.noteTitle || "Note";

    const notesList = document.getElementById("notes-list");
    doc.noteItems.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      notesList.appendChild(li);
    });

    const heroMedia = document.getElementById("hero-media");
    if (content.images.length) {
      content.images.forEach((image) => {
        const frame = document.createElement("figure");
        frame.className = "frame";
        frame.innerHTML = `
          <img src="${image.src}" alt="${image.alt}">
          <figcaption>
            <strong>${image.label}</strong>
            <span>${image.usage}</span>
          </figcaption>
        `;
        heroMedia.appendChild(frame);
      });
    } else {
      document.querySelector(".hero").classList.add("text-only");
      heroMedia.remove();
    }

    const navList = document.getElementById("section-nav");
    const scriptRoot = document.getElementById("script");

    doc.sections.forEach((section, index) => {
      const navItem = document.createElement("li");
      navItem.innerHTML = `<a href="#${section.id}">${section.title}</a>`;
      navList.appendChild(navItem);

      const sectionEl = document.createElement("section");
      sectionEl.className = "script-card";
      sectionEl.id = section.id;

      const firstCue = section.items.find((item) => item.type === "cue");
      sectionEl.innerHTML = `
        <div class="section-top">
          <div style="display:flex; gap:14px; align-items:flex-start;">
            <span class="section-index">${String(index + 1).padStart(2, "0")}</span>
            <h2>${section.title}</h2>
          </div>
          ${firstCue ? `<span class="cue">${firstCue.text}</span>` : ""}
        </div>
      `;

      const body = document.createElement("div");
      body.className = "copy";

      section.items.forEach((item) => {
        if (item.type === "cue") {
          return;
        }

        if (item.type === "quote") {
          const blockquote = document.createElement("blockquote");
          blockquote.innerHTML = item.lines
            .map((line) => `<span>${utils.escapeHtml(line)}</span>`)
            .join("");
          body.appendChild(blockquote);
          return;
        }

        if (item.type === "list") {
          const ul = document.createElement("ul");
          ul.style.margin = "0";
          ul.style.paddingLeft = "20px";
          ul.style.color = "var(--muted)";
          ul.style.lineHeight = "1.7";
          item.items.forEach((entry) => {
            const li = document.createElement("li");
            li.textContent = entry;
            ul.appendChild(li);
          });
          body.appendChild(ul);
          return;
        }

        if (item.type === "paragraph") {
          const p = document.createElement("p");
          if (/^Pausa/i.test(item.text)) {
            p.className = "pause";
          }
          p.innerHTML = utils.renderMultilineText(item.text);
          body.appendChild(p);
        }
      });

      sectionEl.appendChild(body);
      scriptRoot.appendChild(sectionEl);
    });
  </script>
</body>
</html>
